<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Keystroke Reflex Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Keystroke Reflex Game</h1>

    <input type="text" id="wordsInput" placeholder="Enter words (comma separated)" value="apple,train,code">
    <br><br>

    <button onclick="startGame()">START</button>

    <div id="game">
        <div id="char"></div>
        <div id="timer"></div>
        <div id="score"></div>
    </div>

    <div id="result"></div>

    <script src="script.js"></script>
</body>

</html>
